name: Playwright Tests

on:
  push:
    branches: [feature/**]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --project=chromium

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "*Playwright Tests Pasaron*",
              "attachments": [
                {
                  "color": "good",
                  "fields": [
                    { "title": "Repositorio", "value": "${{ github.repository }}", "short": true },
                    { "title": "Rama", "value": "${{ github.ref_name }}", "short": true },
                    { "title": "Ejecutado por", "value": "${{ github.actor }}", "short": true },
                    { "title": "Browser", "value": "Chromium", "short": true },
                    { "title": "Ver ejecución", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                  ]
                }
              ]
            }

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "*Playwright Tests Fallaron*",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    { "title": "Repositorio", "value": "${{ github.repository }}", "short": true },
                    { "title": "Rama", "value": "${{ github.ref_name }}", "short": true },
                    { "title": "Ejecutado por", "value": "${{ github.actor }}", "short": true },
                    { "title": "Browser", "value": "Chromium", "short": true },
                    { "title": "Commit", "value": "${{ github.sha }}", "short": false },
                    { "title": "Ver ejecución", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                  ]
                }
              ]
            }

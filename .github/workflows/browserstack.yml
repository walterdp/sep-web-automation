name: BrowserStack Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_file:
        description: 'Test a ejecutar (ej: tests/cotizador.spec.js). Dejar vacío para correr todos.'
        required: false
        default: ''
        type: string

jobs:
  browserstack:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Log environment info
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"

      - name: Install dependencies
        run: npm ci

      - name: Verify URL accessibility from runner
        run: |
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" https://develop.d2wbsjn1hekdle.amplifyapp.com/send/quote

      - name: Run BrowserStack tests
        run: |
          echo "Node version: $(node --version)"
          echo "browserstack-node-sdk version: $(npx browserstack-node-sdk --version 2>/dev/null || echo 'unknown')"
          if [ -n "${{ github.event.inputs.test_file }}" ]; then
            npx browserstack-node-sdk playwright test ${{ github.event.inputs.test_file }}
          else
            TEST_FILES=$(find tests -name "*.spec.js" -not -path "*/visual/*" 2>/dev/null | tr '\n' ' ')
            npx browserstack-node-sdk playwright test $TEST_FILES
          fi
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "*BrowserStack Tests Pasaron*",
              "attachments": [
                {
                  "color": "good",
                  "fields": [
                    { "title": "Repositorio", "value": "${{ github.repository }}", "short": true },
                    { "title": "Rama", "value": "${{ github.ref_name }}", "short": true },
                    { "title": "Ejecutado por", "value": "${{ github.actor }}", "short": true },
                    { "title": "Ver ejecución", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                  ]
                }
              ]
            }

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "*BrowserStack Tests Fallaron*",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    { "title": "Repositorio", "value": "${{ github.repository }}", "short": true },
                    { "title": "Rama", "value": "${{ github.ref_name }}", "short": true },
                    { "title": "Ejecutado por", "value": "${{ github.actor }}", "short": true },
                    { "title": "Commit", "value": "${{ github.sha }}", "short": false },
                    { "title": "Ver ejecución", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                  ]
                }
              ]
            }
